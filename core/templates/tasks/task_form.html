{% load crispy_forms_tags %}

<form method="post" id="taskForm" action="{{ request.path }}">
    {% csrf_token %}
    {{ form|crispy }}

    <div class="flex w-full gap-2 mt-4">
        <button type="submit"
                class="px-4 py-2 bg-blue-600 text-white rounded">
            Guardar
        </button>
        {% if task.id %}
        <button type="button" id="deleteTaskBtn" data-task-id="{{ task.id }}" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">
            Eliminar
        </button>
        {% endif %}
    </div>
</form>
