{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-6 rounded-lg shadow text-center">
    <h2 class="text-xl font-semibold mb-4">Eliminar Board</h2>

    <p class="text-gray-600 mb-6">
        ¿Seguro que quieres eliminar el board
        <span class="font-semibold">"{{ object.name }}"</span>?
        <br>
        <span class="text-red-600">Esta acción no se puede deshacer.</span>
    </p>

    <form method="post">
        {% csrf_token %}
        <div class="flex justify-center gap-4">
            <a href="{% url 'board_detail' object.pk %}"
               class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">
                Cancelar
            </a>

            <button type="submit"
                    class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700">
                Eliminar
            </button>
        </div>
    </form>
</div>
{% endblock %}
