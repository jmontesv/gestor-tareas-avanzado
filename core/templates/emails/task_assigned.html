<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
</head>
<body style="font-family: Arial, sans-serif; background:#f5f7fa; padding:30px;">
    
    <div style="max-width:600px;margin:auto;background:white;border-radius:12px;padding:30px;box-shadow:0 10px 30px rgba(0,0,0,0.08);">
        
        <h2 style="margin-top:0;color:#111;">
            📌 Nueva tarea asignada
        </h2>

        <p style="color:#555;font-size:16px;">
            Se te ha asignado una nueva tarea en tu board.
        </p>

        <div style="background:#f1f5f9;padding:15px;border-radius:8px;margin:20px 0;">
            <strong>Tarea:</strong> {{ task.title }}<br>
            <strong>Board:</strong> {{ board.name }}<br>
            <strong>Columna:</strong> {{ tasklist.title }}
        </div>

        <a href="http://localhost:8000/boards/{{ board.id }}/"
           style="display:inline-block;margin-top:15px;padding:12px 20px;
                  background:#2563eb;color:white;text-decoration:none;
                  border-radius:8px;font-weight:600;">
            Ver tarea
        </a>

        <p style="margin-top:30px;font-size:12px;color:#999;">
            Este mensaje fue enviado automáticamente por tu gestor de tareas.
        </p>

    </div>

</body>
</html>
