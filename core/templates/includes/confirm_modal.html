<div id="confirmModal" class="fixed inset-0 hidden items-center justify-center z-50">
    
    <div id="confirmOverlay" class="absolute inset-0 bg-black/50"></div>

    <div class="relative bg-white rounded-xl shadow-xl w-full max-w-md p-6 z-10 animate-fade-in">
        <h2 class="text-lg font-semibold text-gray-800 mb-2">
            Confirmar acción
        </h2>
        <p id="confirmMessage" class="text-gray-600 mb-6">
            ¿Estás seguro?
        </p>

        <div class="flex justify-end gap-3">
            <button id="confirmCancel"
                    class="px-4 py-2 rounded-lg bg-gray-200 hover:bg-gray-300 transition">
                Cancelar
            </button>

            <button id="confirmAccept"
                    class="px-4 py-2 rounded-lg bg-red-600 text-white hover:bg-red-700 transition">
                Eliminar
            </button>
        </div>
    </div>
</div>
