<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 60" width="210" height="60">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1d4ed8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect x="4" y="4" width="52" height="52" rx="14" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Checklist lines -->
  <rect x="28" y="17" width="20" height="3" rx="1.5" fill="white" opacity="0.25"/>
  <rect x="28" y="28" width="14" height="3" rx="1.5" fill="white" opacity="0.25"/>
  <rect x="28" y="39" width="17" height="3" rx="1.5" fill="white" opacity="0.25"/>

  <!-- Check 1 (done) -->
  <polyline points="14,18.5 17,21.5 23,15.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Check 2 (done) -->
  <polyline points="14,29.5 17,32.5 23,26.5" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Circle 3 (pending) -->
  <circle cx="18.5" cy="40.5" r="3.5" stroke="white" stroke-width="1.8" fill="none" opacity="0.5"/>

  <!-- Text -->
  <text x="72" y="28" font-family="'Segoe UI', system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b" letter-spacing="-0.3">Gestor</text>
  <text x="72" y="46" font-family="'Segoe UI', system-ui, sans-serif" font-size="13" font-weight="400" fill="#64748b" letter-spacing="0.5">de tareas</text>
</svg>
