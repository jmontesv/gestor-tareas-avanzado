version: "3.9"

services:
  db:
    image: postgres:16
    container_name: gestor_tareas_db
    restart: always
    environment:
      POSTGRES_DB: gestor_tareas_db
      POSTGRES_USER: gestor_tareas_db_user
      POSTGRES_PASSWORD: gestor_tareas_db_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: